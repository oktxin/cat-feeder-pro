# Mosquitto configuration for Cat Feeder IoT Project

# Listen on default MQTT port
listener 1883
protocol mqtt

# Listen on WebSockets port
listener 9001
protocol websockets

# Allow anonymous connections (for development)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Connection messages
connection_messages true

# Retain messages
retained_persistence true
