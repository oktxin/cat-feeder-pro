version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cat-feeder-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - feeder-network

  device:
    build: ./device_emulator
    container_name: cat-feeder-device
    ports:
      - "5000:5000"
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DEVICE_ID: feeder_001
    restart: unless-stopped
    networks:
      - feeder-network

  backend:
    build: ./backend
    container_name: cat-feeder-backend
    ports:
      - "3001:3001"
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DATABASE_URL: file:/data/feeder.db
      PORT: 3001
      NODE_ENV: production
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - feeder-network

  frontend:
    build: ./frontend
    container_name: cat-feeder-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: http://localhost:3001
    restart: unless-stopped
    networks:
      - feeder-network

networks:
  feeder-network:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_logs:
